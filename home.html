<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Issues Tracker</title>

  <!-- Googel font-Geist -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awsome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- import style.css -->
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body class="bg-[#F8FAFC] min-h-screen">

  <!-- header -->
  <header class="bg-white p-2">
    <nav
      class="w-full mx-auto sm:w-11/12 my-3 flex flex-col sm:flex-row gap-3 justify-center sm:justify-between items-center text-center sm:text-left">

      <div class="logo flex items-center justify-center">
        <div><img class="w-10" src="./assets/github-logo.png" alt=""></div>
        <p class="font-semibold text-2xl ml-2">GitHub Issues Tracker</p>
      </div>

      <div class="flex justify-center sm:gap-3 border rounded-lg sm:border-0 sm:p-0">
        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="inputSearch" class="w-full sm:w-[300px]" type="search" required placeholder="Search issues..." />
        </label>
        <button onclick="clickButton(id)" id="issueSearchBtn"
          class="btn btn-primary border-0 rounded-tl-none rounded-bl-none sm:rounded-sm join-item"><i
            class="fa-solid fa-plus mt-[3px]"></i> New Issue</button>
      </div>
    </nav>
  </header>

  <!-- button section -->
  <section class="w-full mx-auto sm:w-9/12 bg-white mt-10 p-3 flex justify-center sm:justify-start gap-2.5 rounded-xl">
    <button id="allBtn" onclick="clickButton(id)"
      class="button_common btn btn-soft btn-primary bg-blue-500 text-white">All</button>
    <button id="openBtn" onclick="clickButton(id)" class="button_common btn btn-soft btn-primary">Open</button>
    <button id="closedBtn" onclick="clickButton(id)" class="button_common btn btn-soft btn-primary">Closed</button>
  </section>


  <section id="spinner" class="flex justify-center items-center my-5 hidden">
    <span class="loading loading-spinner text-primary"></span>
    <span class="loading loading-spinner text-secondary"></span>
    <span class="loading loading-spinner text-accent"></span>
  </section>


  <!-- modal section -->
  <section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="my_modal_1" class="modal">
      <div class="modal-box">

        <div id="modal_container" class="space-y-3">

        </div>
      </div>
    </dialog>
  </section>

  <!-- main section -->
  <section class="main w-full sm:w-9/12 mx-auto my-4 rounded-xl min-h-screen">

    <!-- header of main section -->
    <header class="flex flex-wrap gap-3 justify-between p-5 bg-white rounded-t-xl">

      <!-- header left -->
      <div class="flex gap-2 items-center">
        <div class="p-2 bg-[#ECE4FF] rounded-full block"><img class="block" src="./assets/Aperture.png" alt=""></div>
        <div>
          <h3 id="issueNumber" class="font-semibold text-2xl"></h3>
          <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>

      <!-- header right -->
      <div class="flex gap-3">
        <p class="flex items-center gap-1"><img class="w-3 h-3" src="./assets/greenDot.png" alt="">Open</p>
        <p class="flex items-center gap-1"><img class="w-3 h-3" src="./assets/purpleDot.png" alt="">Closed</p>
      </div>

    </header>

    <!-- main part of main section -->
    <main id="mainSection" class="bg-[#64748B10] grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-4 p-6">

    </main>

  </section>


  <script src="./home.js"></script>
</body>

</html>
